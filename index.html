<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #0f0f1a; color: #fff; font-family: sans-serif; text-align: center; margin: 0; }
        .tab { display: none; padding: 20px; }
        .active { display: block; }
        #rocket { font-size: 50px; display: block; margin: 10px auto; transition: transform 0.1s; }
        #multiplier { font-size: 3rem; color: #00ffcc; font-weight: bold; }
        button { padding: 10px 20px; cursor: pointer; border-radius: 10px; border: none; background: #ff0055; color: white; margin: 5px; }
    </style>
</head>
<body>

    <nav>
        <button onclick="showGame('crash')">انفجار</button>
        <button onclick="showGame('dice')">تاس</button>
    </nav>

    <div id="crash" class="tab active">
        <h1>بازی انفجار</h1>
        <div id="rocket">🚀</div>
        <div id="multiplier">1.00x</div>
        <button id="start-crash" onclick="playCrash()">شروع</button>
    </div>

    <div id="dice" class="tab">
        <h1>بازی تاس</h1>
        <button onclick="rollDice()">تاس بریز</button>
        <h2 id="dice-result">?</h2>
    </div>

    <script>
        function showGame(game) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(game).classList.add('active');
        }

        function playCrash() {
            let mult = 1.00;
            const display = document.getElementById('multiplier');
            const rocket = document.getElementById('rocket');
            let interval = setInterval(() => {
                mult += 0.1;
                display.innerText = mult.toFixed(2) + "x";
                rocket.style.transform = `translateY(-${mult * 10}px)`; // حرکت موشک
                if (Math.random() < 0.05) {
                    clearInterval(interval);
                    display.innerText = "انفجار!";
                }
            }, 100);
        }

        function rollDice() {
            document.getElementById('dice-result').innerText = Math.floor(Math.random() * 6) + 1;
        }
    </script>
</body>
</html>
